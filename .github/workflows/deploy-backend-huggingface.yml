name: Deploy Backend to Hugging Face Space

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend-huggingface.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Push backend folder to Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_REPO: ${{ secrets.HF_SPACE_REPO || 'codemonkeytrouble/chat-app' }}
        run: |
          test -n "$HF_TOKEN"
          test -n "$HF_SPACE_REPO"
          git config --global user.email "actions@github.com"
          git config --global user.name "github-actions"
          git clone "https://user:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE_REPO}" space
          rsync -a --delete \
            --exclude ".git" \
            --exclude ".vs" \
            --exclude "bin" \
            --exclude "obj" \
            --exclude "publish-test" \
            --exclude "chat.db*" \
            --exclude "backend.log" \
            --exclude "wwwroot/uploads" \
            backend/ space/
          cd space
          git add .
          git diff --cached --quiet && exit 0
          git commit -m "Deploy backend from GitHub Actions"
          git push
