<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Admin Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f1a; color: #e0e0e0; min-height: 100vh; }
  .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
  h1 { font-size: 1.5rem; margin-bottom: 20px; color: #fff; }
  h1 span { color: #888; font-weight: normal; }

  /* Login */
  .login-box { max-width: 400px; margin: 100px auto; text-align: center; }
  .login-box h1 { margin-bottom: 8px; }
  .login-box p { color: #888; margin-bottom: 24px; font-size: 0.9rem; }
  .login-box input { width: 100%; padding: 12px 16px; border: 1px solid #333; border-radius: 8px; background: #1a1a2e; color: #fff; font-size: 1rem; outline: none; }
  .login-box input:focus { border-color: #6c5ce7; }
  .login-box button { margin-top: 12px; width: 100%; padding: 12px; border: none; border-radius: 8px; background: #6c5ce7; color: #fff; font-size: 1rem; cursor: pointer; font-weight: 600; }
  .login-box button:hover { background: #5a4bd1; }
  .login-box .error { color: #ff6b6b; margin-top: 12px; font-size: 0.85rem; }

  /* Loading */
  .loading { text-align: center; padding: 60px; color: #666; }
  .spinner { width: 32px; height: 32px; border: 3px solid #333; border-top-color: #6c5ce7; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Tabs */
  .tab-bar { display: flex; gap: 4px; margin-bottom: 20px; background: #151528; border-radius: 10px; padding: 4px; }
  .tab-btn { flex: 1; padding: 10px 20px; border: none; border-radius: 8px; background: transparent; color: #888; font-size: 0.9rem; cursor: pointer; font-weight: 500; transition: all 0.2s; }
  .tab-btn:hover { color: #ddd; background: #1e1e38; }
  .tab-btn.active { background: #6c5ce7; color: #fff; font-weight: 600; }

  /* Stats */
  .stats { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
  .stat-card { background: #1a1a2e; border: 1px solid #2a2a3e; border-radius: 10px; padding: 16px 24px; flex: 1; min-width: 140px; }
  .stat-card .num { font-size: 1.6rem; font-weight: 700; color: #fff; }
  .stat-card .label { font-size: 0.8rem; color: #888; margin-top: 4px; }

  /* Room list */
  .room-grid { display: grid; gap: 12px; }
  .room-card { background: #1a1a2e; border: 1px solid #2a2a3e; border-radius: 10px; padding: 16px 20px; cursor: pointer; transition: border-color 0.2s; }
  .room-card:hover { border-color: #6c5ce7; }
  .room-card .top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .room-card .name { font-weight: 600; color: #fff; }
  .room-card .badge { font-size: 0.75rem; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
  .badge-public { background: #2d6a4f; color: #95d5b2; }
  .badge-private { background: #5a189a; color: #e0aaff; }
  .badge-closed { background: #7f2d2d; color: #ffb3b3; }
  .room-card .meta { font-size: 0.8rem; color: #888; display: flex; gap: 16px; flex-wrap: wrap; }

  /* Message view */
  .back-btn { display: inline-block; margin-bottom: 16px; padding: 8px 16px; border: 1px solid #333; border-radius: 6px; color: #ccc; text-decoration: none; font-size: 0.85rem; cursor: pointer; background: none; }
  .back-btn:hover { border-color: #6c5ce7; color: #fff; }
  .room-info { background: #1a1a2e; border: 1px solid #2a2a3e; border-radius: 10px; padding: 16px 20px; margin-bottom: 16px; }
  .room-info .row { display: flex; gap: 24px; font-size: 0.85rem; color: #888; margin-top: 8px; flex-wrap: wrap; }
  .msg-list { display: flex; flex-direction: column; gap: 8px; }
  .msg { background: #1a1a2e; border: 1px solid #2a2a3e; border-radius: 8px; padding: 12px 16px; }
  .msg .head { display: flex; justify-content: space-between; font-size: 0.8rem; margin-bottom: 4px; }
  .msg .sender { color: #6c5ce7; font-weight: 600; }
  .msg .time { color: #555; }
  .msg .content { color: #ddd; word-break: break-word; }
  .msg .content img { max-width: 240px; border-radius: 6px; margin-top: 6px; display: block; }
  .msg-empty { text-align: center; padding: 40px; color: #555; }

  .nav-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; gap: 12px; flex-wrap: wrap; }
  .nav-bar h1 { margin-bottom: 0; }
  .nav-bar .nav-actions { display: flex; align-items: center; gap: 8px; }
  .nav-bar button { background: none; border: 1px solid #333; color: #ccc; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; white-space: nowrap; }
  .nav-bar button:hover { border-color: #ff6b6b; color: #ff6b6b; }
  .nav-bar button.logout-btn:hover { border-color: #ff6b6b; color: #ff6b6b; }

  /* Live indicator */
  .live-indicator { display: inline-flex; align-items: center; gap: 5px; font-size: 0.8rem; font-weight: 600; padding: 4px 10px; border-radius: 12px; cursor: pointer; user-select: none; }
  .live-indicator.on { background: #1a3a2a; color: #4ade80; border: 1px solid #2a5a3a; }
  .live-indicator.off { background: #3a2a2a; color: #f87171; border: 1px solid #5a3a3a; }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
  .live-indicator.on .live-dot { background: #4ade80; animation: pulse-dot 1.5s ease-in-out infinite; }
  .live-indicator.off .live-dot { background: #f87171; }
  @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  .live-indicator .live-label { font-size: 0.7rem; color: inherit; }

  /* ── Gallery ── */
  .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }
  .gallery-card { background: #1a1a2e; border: 1px solid #2a2a3e; border-radius: 10px; overflow: hidden; transition: border-color 0.2s, transform 0.2s; cursor: pointer; }
  .gallery-card:hover { border-color: #6c5ce7; transform: translateY(-2px); }
  .gallery-card .img-wrap { width: 100%; aspect-ratio: 4/3; overflow: hidden; background: #111; display: flex; align-items: center; justify-content: center; }
  .gallery-card .img-wrap img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s; }
  .gallery-card:hover .img-wrap img { transform: scale(1.05); }
  .gallery-card .meta { padding: 10px 12px; }
  .gallery-card .meta .room { font-size: 0.8rem; color: #6c5ce7; font-weight: 600; margin-bottom: 2px; }
  .gallery-card .meta .sender { font-size: 0.75rem; color: #888; }
  .gallery-card .meta .time { font-size: 0.7rem; color: #555; }
  .gallery-empty { text-align: center; padding: 60px 20px; color: #555; }
  .gallery-empty .big-icon { font-size: 3rem; margin-bottom: 12px; }
  .gallery-empty p { font-size: 0.95rem; }

  /* Lightbox */
  .lightbox { display: none; position: fixed; z-index: 999; inset: 0; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; padding: 40px; }
  .lightbox.open { display: flex; }
  .lightbox img { max-width: 100%; max-height: 90vh; border-radius: 8px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
  .lightbox .close { position: absolute; top: 20px; right: 30px; font-size: 2rem; color: #fff; cursor: pointer; background: none; border: none; }
  .lightbox .close:hover { color: #ff6b6b; }
  .lightbox .caption { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); padding: 8px 20px; border-radius: 8px; color: #ddd; font-size: 0.85rem; text-align: center; max-width: 80%; }
</style>
</head>
<body>
<div class="container" id="app"></div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="close" onclick="closeLightbox()">&times;</button>
  <img id="lightbox-img" src="" alt="" />
  <div class="caption" id="lightbox-caption"></div>
</div>

<script>
// ── Config ──
const API = window.location.origin + '/api/admin';
const REFRESH_MS = 5000; // 5 seconds
let adminKey = localStorage.getItem('admin_key') || '';
let refreshInterval = null;
let autoRefresh = true;

// ── Helpers ──
function apiUrl(path) { return API + path + (path.includes('?') ? '&' : '?') + 'key=' + encodeURIComponent(adminKey); }

async function fetchJson(path) {
  const res = await fetch(apiUrl(path));
  if (res.status === 401) { adminKey = ''; localStorage.removeItem('admin_key'); stopRefresh(); render(); throw new Error('Unauthorized'); }
  if (!res.ok) { const err = await res.json().catch(() => ({ error: res.statusText })); throw new Error(err.error || res.statusText); }
  return res.json();
}

function ago(ts) {
  if (!ts) return '—';
  const ms = Date.now() - new Date(ts).getTime();
  const mins = Math.floor(ms / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ago';
  const days = Math.floor(hrs / 24);
  return days + 'd ago';
}

function fmtTime(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  return d.toLocaleString();
}

function esc(str) {
  if (!str) return '';
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function imgSrc(imageUrl) {
  if (!imageUrl) return '';
  if (imageUrl.startsWith('http')) return esc(imageUrl);
  return API.replace('/api/admin', '') + esc(imageUrl);
}

// ── Lightbox ──
function openLightbox(src, caption) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox-caption').textContent = caption || '';
  document.getElementById('lightbox').classList.add('open');
  document.addEventListener('keydown', lightboxKeyHandler);
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.removeEventListener('keydown', lightboxKeyHandler);
}
function lightboxKeyHandler(e) { if (e.key === 'Escape') closeLightbox(); }

let _galleryData = [];
function openGalleryImage(index) {
  const img = _galleryData[index];
  if (!img) return;
  const src = imgSrc(img.imageUrl);
  const caption = (img.caption || img.roomName) + ' — ' + img.sender + ' @ ' + fmtTime(img.timestamp);
  openLightbox(src, caption);
}

// ── Refresh ──
function stopRefresh() {
  if (refreshInterval) { clearInterval(refreshInterval); refreshInterval = null; }
}

function startRefresh(fn) {
  stopRefresh();
  if (!autoRefresh) return;
  refreshInterval = setInterval(fn, REFRESH_MS);
}

function toggleAutoRefresh() {
  autoRefresh = !autoRefresh;
  if (autoRefresh) {
    if (state === 'messages' && currentRoomId) refreshMessages();
    else if (state === 'gallery') refreshGallery();
    else refreshRooms();
    startRefresh(getRefreshFn());
  } else {
    stopRefresh();
  }
  updateLiveIndicator();
}

function getRefreshFn() {
  if (state === 'messages' && currentRoomId) return refreshMessages;
  if (state === 'gallery') return refreshGallery;
  return refreshRooms;
}

function updateLiveIndicator() {
  const dot = document.getElementById('live-dot');
  const label = document.getElementById('live-label');
  const indicator = document.getElementById('live-indicator');
  if (!dot || !label || !indicator) return;
  if (autoRefresh) {
    indicator.className = 'live-indicator on';
    dot.className = 'live-dot';
    label.textContent = 'LIVE';
  } else {
    indicator.className = 'live-indicator off';
    dot.className = 'live-dot';
    label.textContent = 'PAUSED';
  }
}

// ── Data refresh functions ──

async function refreshRooms() {
  try {
    const rooms = await fetchJson('/rooms');
    if (state !== 'rooms') return;
    const totalMsgs = rooms.reduce((s, r) => s + r.messageCount, 0);
    const openRooms = rooms.filter(r => !r.isClosed).length;
    const statsEls = document.querySelectorAll('.stat-card .num');
    if (statsEls.length >= 3) { statsEls[0].textContent = rooms.length; statsEls[1].textContent = openRooms; statsEls[2].textContent = totalMsgs; }
    const grid = document.querySelector('.room-grid');
    if (!grid) return;
    const prevScroll = window.scrollY;
    grid.innerHTML = rooms.map(r => {
      const badge = r.isClosed ? 'badge-closed' : (r.type === 'public' ? 'badge-public' : 'badge-private');
      const label = r.isClosed ? 'Closed' : (r.type === 'public' ? 'Public' : 'Private');
      return '<div class="room-card" onclick="viewRoom(' + r.id + ')">' +
        '<div class="top"><span class="name">' + esc(r.name) + '</span><span class="badge ' + badge + '">' + label + '</span></div>' +
        '<div class="meta"><span>\uD83D\uDCAC ' + r.messageCount + ' messages</span><span>\uD83D\uDC65 ' + r.memberCount + ' members</span>' +
        '<span>\uD83D\uDCC5 ' + fmtTime(r.createdAt) + '</span>' +
        (r.lastMessageAt ? '<span>\uD83D\uDD50 last ' + ago(r.lastMessageAt) + '</span>' : '') + '</div></div>';
    }).join('');
    window.scrollTo(0, prevScroll);
  } catch (e) { /* silent */ }
}

async function refreshMessages() {
  if (!currentRoomId) return;
  try {
    const data = await fetchJson('/rooms/' + currentRoomId + '/messages');
    if (state !== 'messages' || currentRoomId !== data.room.id) return;
    const room = data.room;
    const msgs = data.messages;
    const list = document.querySelector('.msg-list');
    if (!list) return;
    const infoEl = document.querySelector('.room-info .row');
    if (infoEl) infoEl.innerHTML = '<span>\uD83D\uDC65 ' + room.members.join(', ') + '</span><span>\uD83D\uDCAC ' + msgs.length + ' messages</span><span>\uD83D\uDCC5 Created ' + fmtTime(room.createdAt) + '</span>';
    const wasAtBottom = window.scrollY + window.innerHeight >= document.body.scrollHeight - 60;
    list.innerHTML = msgs.length === 0 ? '<div class="msg-empty">No messages in this room yet.</div>'
      : msgs.map(m => {
          let content = esc(m.content);
          let img = '';
          if (m.messageType === 'image' && m.imageUrl) {
            img = '<img src="' + imgSrc(m.imageUrl) + '" alt="chat image" />';
          }
          return '<div class="msg"><div class="head"><span class="sender">' + esc(m.sender) + '</span><span class="time">' + fmtTime(m.timestamp) + '</span></div><div class="content">' + content + img + '</div></div>';
        }).join('');
    if (wasAtBottom) window.scrollTo(0, document.body.scrollHeight);
  } catch (e) { /* silent */ }
}

async function refreshGallery() {
  try {
    const images = await fetchJson('/gallery');
    if (state !== 'gallery') return;
    _galleryData = images;
    const grid = document.querySelector('.gallery-grid');
    if (!grid) return;
    const statsEls = document.querySelectorAll('.stat-card .num');
    if (statsEls.length >= 1) { statsEls[0].textContent = images.length; }
    const prevScroll = window.scrollY;
    if (images.length === 0) {
      grid.innerHTML = '<div class="gallery-empty"><div class="big-icon">\uD83D\uDCF7</div><p>No images uploaded yet. Share an image in a chat room and it will appear here.</p></div>';
    } else {
      grid.innerHTML = images.map((img, i) => {
        const src = imgSrc(img.imageUrl);
        return '<div class="gallery-card" onclick="openGalleryImage(' + i + ')">' +
          '<div class="img-wrap"><img src="' + src + '" alt="' + esc(img.caption || '') + '" loading="lazy" /></div>' +
          '<div class="meta"><div class="room">\uD83D\uDCCD ' + esc(img.roomName) + '</div><div class="sender">\uD83D\uDC64 ' + esc(img.sender) + '</div><div class="time">\uD83D\uDD52 ' + fmtTime(img.timestamp) + '</div></div></div>';
      }).join('');
    }
    window.scrollTo(0, prevScroll);
  } catch (e) { /* silent */ }
}

// ── Renderers ──

function renderLogin(err) {
  return '<div class="login-box">' +
    '<h1>\uD83D\uDD12 Admin Dashboard</h1>' +
    '<p>Enter the admin key to view all chat conversations.</p>' +
    '<input type="password" id="key-input" placeholder="Admin key" autofocus onkeydown="if(event.key===\'Enter\') login()" />' +
    '<button onclick="login()">Unlock Dashboard \u2192</button>' +
    (err ? '<div class="error">' + esc(err) + '</div>' : '') + '</div>';
}

function renderTabs(activeTab) {
  return '<div class="tab-bar">' +
    '<button class="tab-btn' + (activeTab === 'rooms' ? ' active' : '') + '" onclick="switchTab(\'rooms\')">\uD83D\uDCCB Rooms</button>' +
    '<button class="tab-btn' + (activeTab === 'gallery' ? ' active' : '') + '" onclick="switchTab(\'gallery\')">\uD83D\uDCF7 Gallery</button>' +
    '</div>';
}

function renderRooms(data) {
  const totalMsgs = data.reduce((s, r) => s + r.messageCount, 0);
  const openRooms = data.filter(r => !r.isClosed).length;
  const roomsHtml = data.map(r => {
    const badge = r.isClosed ? 'badge-closed' : (r.type === 'public' ? 'badge-public' : 'badge-private');
    const label = r.isClosed ? 'Closed' : (r.type === 'public' ? 'Public' : 'Private');
    return '<div class="room-card" onclick="viewRoom(' + r.id + ')">' +
      '<div class="top"><span class="name">' + esc(r.name) + '</span><span class="badge ' + badge + '">' + label + '</span></div>' +
      '<div class="meta"><span>\uD83D\uDCAC ' + r.messageCount + ' messages</span><span>\uD83D\uDC65 ' + r.memberCount + ' members</span>' +
      '<span>\uD83D\uDCC5 ' + fmtTime(r.createdAt) + '</span>' +
      (r.lastMessageAt ? '<span>\uD83D\uDD50 last ' + ago(r.lastMessageAt) + '</span>' : '') + '</div></div>';
  }).join('');
  const liveClass = autoRefresh ? 'on' : 'off';
  const liveLabel = autoRefresh ? 'LIVE' : 'PAUSED';
  return renderTabs('rooms') +
    '<div class="nav-bar"><h1>\uD83D\uDCCB Chat Rooms <span>(' + data.length + ' rooms)</span></h1>' +
    '<div class="nav-actions"><div id="live-indicator" class="live-indicator ' + liveClass + '" onclick="toggleAutoRefresh()" title="Toggle auto-refresh">' +
    '<span id="live-dot" class="live-dot"></span><span id="live-label" class="live-label">' + liveLabel + '</span></div>' +
    '<button class="logout-btn" onclick="logout()">Logout</button></div></div>' +
    '<div class="stats"><div class="stat-card"><div class="num">' + data.length + '</div><div class="label">Total Rooms</div></div>' +
    '<div class="stat-card"><div class="num">' + openRooms + '</div><div class="label">Active Rooms</div></div>' +
    '<div class="stat-card"><div class="num">' + totalMsgs + '</div><div class="label">Total Messages</div></div></div>' +
    '<div class="room-grid">' + roomsHtml + '</div>';
}

function renderMessages(room, msgs) {
  const badge = room.isClosed ? 'badge-closed' : (room.type === 'public' ? 'badge-public' : 'badge-private');
  const label = room.isClosed ? 'Closed' : (room.type === 'public' ? 'Public' : 'Private');
  const liveClass = autoRefresh ? 'on' : 'off';
  const liveLabel = autoRefresh ? 'LIVE' : 'PAUSED';
  const msgsHtml = msgs.length === 0 ? '<div class="msg-empty">No messages in this room yet.</div>'
    : msgs.map(m => {
        let content = esc(m.content);
        let img = '';
        if (m.messageType === 'image' && m.imageUrl) {
          img = '<img src="' + imgSrc(m.imageUrl) + '" alt="chat image" />';
        }
        return '<div class="msg"><div class="head"><span class="sender">' + esc(m.sender) + '</span><span class="time">' + fmtTime(m.timestamp) + '</span></div><div class="content">' + content + img + '</div></div>';
      }).join('');
  return '<div class="nav-bar"><button class="back-btn" onclick="backToRooms()">\u2190 Back to Rooms</button>' +
    '<div class="nav-actions"><div id="live-indicator" class="live-indicator ' + liveClass + '" onclick="toggleAutoRefresh()" title="Toggle auto-refresh">' +
    '<span id="live-dot" class="live-dot"></span><span id="live-label" class="live-label">' + liveLabel + '</span></div></div></div>' +
    '<div class="room-info"><strong style="color:#fff;font-size:1.1rem">' + esc(room.name) + '</strong>' +
    '<span class="badge ' + badge + '" style="margin-left:8px">' + label + '</span>' +
    '<div class="row"><span>\uD83D\uDC65 ' + room.members.join(', ') + '</span><span>\uD83D\uDCAC ' + msgs.length + ' messages</span><span>\uD83D\uDCC5 Created ' + fmtTime(room.createdAt) + '</span></div></div>' +
    '<div class="msg-list">' + msgsHtml + '</div>';
}

function renderGallery(images) {
  const liveClass = autoRefresh ? 'on' : 'off';
  const liveLabel = autoRefresh ? 'LIVE' : 'PAUSED';
  const gridHtml = images.length === 0
    ? '<div class="gallery-empty"><div class="big-icon">\uD83D\uDCF7</div><p>No images uploaded yet. Share an image in a chat room and it will appear here.</p></div>'
    : images.map((img, i) => {
        const src = imgSrc(img.imageUrl);
        return '<div class="gallery-card" onclick="openGalleryImage(' + i + ')">' +
          '<div class="img-wrap"><img src="' + src + '" alt="' + esc(img.caption || '') + '" loading="lazy" /></div>' +
          '<div class="meta"><div class="room">\uD83D\uDCCD ' + esc(img.roomName) + '</div><div class="sender">\uD83D\uDC64 ' + esc(img.sender) + '</div><div class="time">\uD83D\uDD52 ' + fmtTime(img.timestamp) + '</div></div></div>';
      }).join('');

  return renderTabs('gallery') +
    '<div class="nav-bar"><h1>\uD83D\uDCF7 Image Gallery <span>(' + images.length + ' images)</span></h1>' +
    '<div class="nav-actions"><div id="live-indicator" class="live-indicator ' + liveClass + '" onclick="toggleAutoRefresh()" title="Toggle auto-refresh">' +
    '<span id="live-dot" class="live-dot"></span><span id="live-label" class="live-label">' + liveLabel + '</span></div>' +
    '<button class="logout-btn" onclick="logout()">Logout</button></div></div>' +
    '<div class="stats"><div class="stat-card"><div class="num">' + images.length + '</div><div class="label">Total Images</div></div></div>' +
    '<div class="gallery-grid">' + gridHtml + '</div>';
}

// ── State ──
let state = 'rooms'; // 'rooms' | 'messages' | 'gallery'
let currentRoomId = null;

async function login() {
  const key = document.getElementById('key-input').value;
  if (!key) return;
  adminKey = key;
  localStorage.setItem('admin_key', key);
  render();
}

function logout() {
  stopRefresh();
  adminKey = '';
  localStorage.removeItem('admin_key');
  render();
}

async function switchTab(tab) {
  if (tab === 'gallery' && state === 'gallery') return;
  if (tab === 'rooms' && state === 'rooms') return;
  stopRefresh();
  state = tab === 'gallery' ? 'gallery' : 'rooms';
  currentRoomId = null;
  await render();
}

async function backToRooms() {
  stopRefresh();
  state = 'rooms';
  currentRoomId = null;
  await render();
}

async function viewRoom(roomId) {
  stopRefresh();
  currentRoomId = roomId;
  state = 'messages';
  await render();
}

async function render() {
  const app = document.getElementById('app');
  if (!adminKey) { stopRefresh(); app.innerHTML = renderLogin(); return; }
  app.innerHTML = '<div class="loading"><div class="spinner"></div>Loading...</div>';
  try {
    if (state === 'messages' && currentRoomId) {
      const data = await fetchJson('/rooms/' + currentRoomId + '/messages');
      app.innerHTML = renderMessages(data.room, data.messages);
      startRefresh(refreshMessages);
    } else if (state === 'gallery') {
      const images = await fetchJson('/gallery');
      app.innerHTML = renderGallery(images);
      startRefresh(refreshGallery);
    } else {
      state = 'rooms';
      const rooms = await fetchJson('/rooms');
      app.innerHTML = renderRooms(rooms);
      startRefresh(refreshRooms);
    }
  } catch (err) {
    stopRefresh();
    if (!adminKey) { app.innerHTML = renderLogin(err.message); }
    else { app.innerHTML = '<div class="login-box"><div class="error">Error: ' + esc(err.message) + '</div><button onclick="render()" style="margin-top:16px;padding:8px 24px;border:none;border-radius:6px;background:#6c5ce7;color:#fff;cursor:pointer">Retry</button></div>'; }
  }
}

// ── Boot ──
render();
</script>
</body>
</html>
